name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — typecheck · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      # Integration tests (auth, products) require a live DB — run locally only.
      # Unit tests (costing, stock) run here.
      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

  frontend:
    name: Frontend — test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test -- --watchAll=false --passWithNoTests

      # CI=false prevents CRA from treating ESLint warnings as build errors.
      # Remove this flag only after all warnings are resolved or ESLint is
      # configured to enforce rules explicitly.
      - name: Build
        run: CI=false npm run build
